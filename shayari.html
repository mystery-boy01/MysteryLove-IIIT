<!DOCTYPE html>
<html>
<head>
    <title>Shayari</title>

    <style>
        body {
            margin: 0;
            background: #0b0b12;
            font-family: Georgia, serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 80px;
        }

        /* 🌙 Moon */
        .moon {
            position: fixed;
            top: 50px;
            right: 80px;
            width: 70px;
            height: 70px;
            background: #f5f3ce;
            border-radius: 50%;
            box-shadow: 0 0 30px #f5f3ce;
        }

        /* 📜 Wrapper (for buttons positioning) */
        .container {
            position: relative;
        }

        /* 📜 Paper */
        .paper {
            width: 600px;
            background: linear-gradient(#f5e6c8, #f1d9b5);
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            color: #3b2f2f;
            position: relative;
        }

        /* ✍ Shayari */
        #shayari-text {
            font-size: 22px;
            line-height: 1.8;
            white-space: pre-line;
            font-weight: bold;
        }

        /* ✍ Author (inside paper, right bottom) */
        .author {
            margin-top: 30px;
            text-align: right;
            font-style: italic;
        }

        /* 🔘 Buttons (outside paper) */
        .btn {
            position: absolute;
            bottom: -60px;
            padding: 10px 25px;
            border: 1px solid #ff9aa2;
            background: transparent;
            color: #ff9aa2;
            border-radius: 20px;
            cursor: pointer;
        }

        .prev {
            left: 0;
        }

        .next {
            right: 0;
        }

        .btn:hover {
            background: #ff9aa2;
            color: black;
        }

    </style>
</head>

let index = 0;

function showShayari(){
    document.getElementById("shayari-text").innerText = shayariList[index].text;

}

function nextShayari(){

}

function prevShayari(){

}
